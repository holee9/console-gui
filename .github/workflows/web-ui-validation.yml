name: Web UI CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/**
      - feature/**
      - codex/**
      - claude/**
    paths:
      - .github/workflows/web-ui-validation.yml
      - web-ui/**
      - src/HnVue.Web/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/web-ui-validation.yml
      - web-ui/**
      - src/HnVue.Web/**

permissions:
  contents: read

concurrency:
  group: web-ui-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect web UI workspace
        id: detect
        shell: bash
        run: |
          if [ -f web-ui/package.json ]; then
            echo "has_workspace=true" >> "$GITHUB_OUTPUT"
            echo "app_dir=web-ui" >> "$GITHUB_OUTPUT"
          elif [ -f src/HnVue.Web/package.json ]; then
            echo "has_workspace=true" >> "$GITHUB_OUTPUT"
            echo "app_dir=src/HnVue.Web" >> "$GITHUB_OUTPUT"
          else
            echo "has_workspace=false" >> "$GITHUB_OUTPUT"
            echo "No web UI workspace found. Skipping Web UI CI."
          fi

      - name: Skip until a web UI workspace exists
        if: ${{ steps.detect.outputs.has_workspace != 'true' }}
        run: echo "No web UI workspace found; the workflow scaffold is ready for future web UI work."

      - name: Setup pnpm
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: pnpm run --if-present lint

      - name: Typecheck
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: pnpm run --if-present typecheck

      - name: Test
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: pnpm run --if-present test

      - name: Install Playwright browser
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: pnpm run --if-present test:e2e

      - name: Build
        if: ${{ steps.detect.outputs.has_workspace == 'true' }}
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: pnpm run build

      - name: Upload web UI build output
        if: ${{ always() && steps.detect.outputs.has_workspace == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-build-output
          path: |
            ${{ steps.detect.outputs.app_dir }}/dist/**
            ${{ steps.detect.outputs.app_dir }}/build/**
            ${{ steps.detect.outputs.app_dir }}/playwright-report/**
            ${{ steps.detect.outputs.app_dir }}/test-results/**
          if-no-files-found: warn
